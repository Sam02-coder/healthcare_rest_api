server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/healthcare_db?createDatabaseIfNotExist=true
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

jwt:
  secret: healthcareprojectsecretkeyhealthcareprojectsecretkey

logging:
  level:
    root: INFO
    com.healthcare: DEBUG

  file:
    name: logs/healthcare-dev.log